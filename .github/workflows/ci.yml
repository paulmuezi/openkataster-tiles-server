name: CI

on:
  push:
    branches: [main, "release/**"]
  pull_request:

permissions:
  contents: read

env:
  PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/openkataster_tiles
  OPENKATASTER_TILE_DATA_DIR: ${{ github.workspace }}/.ci/data
  OPENKATASTER_VIEWER_ROOT: ${{ github.workspace }}/live-viewer
  OPENKATASTER_EUROPE_BASEMAP_ROOT: ${{ github.workspace }}/.ci/basemaps/europe
  OPENKATASTER_EUROPE_BASEMAP_MODE: "off"
  OPENKATASTER_POSTCODE_AREAS_DB: ${{ github.workspace }}/.ci/plz/postcode_areas.sqlite
  OPENKATASTER_OPENPLZ_DB: ${{ github.workspace }}/.ci/plz/openplz.sqlite
  OPENKATASTER_TILE_ACTIVE_VOLUME_ROOT: ${{ github.workspace }}/.ci/active

jobs:
  runtime-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install runtime dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pillow cryptography httpx==0.28.1
      - name: Prepare isolated runtime paths
        run: mkdir -p .ci/data .ci/plz .ci/active .ci/basemaps/europe
      - name: Run runtime regressions
        run: >-
          python -m unittest -v
          tests.test_search_analytics
          tests.test_search_runtime_fix
          tests.test_bev_vector_proxy
          tests.test_austria_feature_normalization
          tests.test_cadastre_wms_proxy
          tests.test_luftbild_proxy
          tests.test_europe_basemap

  producer-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install producer test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pillow cryptography
      - name: Prepare isolated runtime paths
        run: mkdir -p .ci/data .ci/plz .ci/active .ci/basemaps/europe
      - name: Run upload and producer regressions
        run: >-
          python -m unittest -v
          tests.test_volume_upload_versions
          tests.test_extract_alkis_building_relation_patch
          tests.test_merge_alkis_feature_indexes
          tests.test_apply_alkis_building_relation_patch

  viewer-node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Run viewer regressions
        run: node --test tests/*.test.mjs
      - name: Verify Europe basemap operations contract
        run: bash scripts/europe-basemap/tests/run.sh
      - name: Verify generated Europe basemap style
        working-directory: scripts/europe-basemap
        run: |
          npm ci
          npm run build-style
          git diff --exit-code -- ../../live-viewer/europe-basemap-style-20260724-bkg4/style.json

  image:
    runs-on: ubuntu-latest
    needs: [runtime-python, producer-python, viewer-node]
    steps:
      - uses: actions/checkout@v4
      - name: Build production image
        run: |
          docker build \
            --build-arg OPENKATASTER_REVISION=${{ github.sha }} \
            --tag openkataster-tiles:${{ github.sha }} \
            .
          test "$(docker image inspect \
            --format '{{ index .Config.Labels "org.opencontainers.image.revision" }}' \
            openkataster-tiles:${{ github.sha }})" = "${{ github.sha }}"
          docker image inspect \
            --format '{{ range .Config.Env }}{{ println . }}{{ end }}' \
            openkataster-tiles:${{ github.sha }} \
            | grep -Fx "OPENKATASTER_RELEASE_REVISION=${{ github.sha }}"

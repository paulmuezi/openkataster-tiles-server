# Routes used while tiles.openkataster.de still terminates TLS on the frontend server.
# The long-term all-in-one deployment proxies directly through Caddy instead.

location = /api/docs {
    proxy_pass http://195.201.242.216:8081/docs;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location = /api/openapi.json {
    proxy_pass http://195.201.242.216:8081/openapi.json;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location = /openapi.json {
    proxy_pass http://195.201.242.216:8081/openapi.json;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location = /docs/embed {
    proxy_pass http://195.201.242.216:8081/docs/embed;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location = /embed-contract-v1.js {
    proxy_pass http://195.201.242.216:8081/embed-contract-v1.js;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location ^~ /embed-runtime/ {
    proxy_pass http://195.201.242.216:8081;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location ^~ /embed/ {
    proxy_pass http://195.201.242.216:8081;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

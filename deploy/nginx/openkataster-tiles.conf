server {
    server_name tiles.openkataster.de;

    client_max_body_size 1m;

    location ~ ^/tiles/[^/]+/[0-9]+/[0-9]+/[0-9]+\.mvt$ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache openkataster_tiles_cache;
        proxy_cache_key "$scheme|$host|$request_uri";
        proxy_cache_valid 200 30d;
        proxy_cache_valid 404 5m;
        proxy_cache_lock on;
        proxy_cache_lock_timeout 10s;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_ignore_headers Cache-Control Expires Set-Cookie;
        proxy_hide_header Cache-Control;
        proxy_hide_header Expires;
        proxy_hide_header Set-Cookie;
        add_header X-OpenKataster-Cache $upstream_cache_status always;
        add_header Cache-Control "public, max-age=2592000, immutable" always;
    }
    location = /viewer/deutschland {
        alias /srv/openkataster-tiles/live-viewer/deutschland-v2/index.html;
        default_type text/html;
        add_header Cache-Control "no-store" always;
    }

    location ^~ /viewer-assets/deutschland/ {
        alias /srv/openkataster-tiles/live-viewer/deutschland-v2/;
        add_header Cache-Control "public, max-age=3600" always;
    }
    location = /viewer/deutschland-v2 {
        alias /srv/openkataster-tiles/live-viewer/deutschland-v2/index.html;
        default_type text/html;
        add_header Cache-Control "no-store" always;
    }

    location ^~ /viewer-assets/deutschland-v2/ {
        alias /srv/openkataster-tiles/live-viewer/deutschland-v2/;
        add_header Cache-Control "public, max-age=3600" always;
    }
    location = /assets/states.json {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-API-Key "y2Gi6D47jEClM12fnar_PaLGz9uHCK8Tu7yrbW0FiII";
        add_header Cache-Control "public, max-age=3600" always;
    }

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen 443 ssl; # managed by Certbot
    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    http2 on;
    ssl_certificate /etc/letsencrypt/live/tiles.openkataster.de/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/tiles.openkataster.de/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = tiles.openkataster.de) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80 default_server;
    listen [::]:80 default_server;
    server_name tiles.openkataster.de;
    return 404; # managed by Certbot
}

name: openkataster_tiles

services:
  tiles-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openkataster-tiles-api
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - /srv/openkataster-tiles/data:/srv/openkataster-tiles/data
      - /srv/openkataster-tiles/active:/srv/openkataster-tiles/active
      - /srv/openkataster-tiles/cache:/srv/openkataster-tiles/cache
      - /srv/openkataster-tiles/plz:/srv/openkataster-tiles/plz
      - /srv/openkataster-tiles/logs:/srv/openkataster-tiles/logs
      - /srv/openkataster-tiles/live-viewer:/srv/openkataster-tiles/live-viewer:ro
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  caddy:
    image: caddy:2-alpine
    container_name: openkataster-tiles-caddy
    restart: unless-stopped
    depends_on:
      tiles-api:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
      - "8081:8081"
      - "8083:8083"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8081/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  caddy_data:
  caddy_config:

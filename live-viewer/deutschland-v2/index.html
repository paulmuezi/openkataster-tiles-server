    <script>
      (function(){
        var params = new URLSearchParams(window.location.search);
        if (params.get("debugInput") !== "1") return;
        var panel = document.createElement("div");
        panel.style.cssText = [
          "position:fixed",
          "right:10px",
          "bottom:34px",
          "z-index:99999",
          "padding:8px 10px",
          "border:1px solid #ddd",
          "border-radius:6px",
          "background:rgba(255,255,255,.94)",
          "font:12px/1.35 ui-monospace,SFMono-Regular,Menlo,monospace",
          "color:#111",
          "pointer-events:none",
          "white-space:pre"
        ].join(";");
        document.body.appendChild(panel);
        var counts = { wheel: 0, scroll: 0, gesturestart: 0, gesturechange: 0 };
        var lastWheel = "";
        function targetLabel(target) {
          if (!target) return "";
          var id = target.id ? "#" + target.id : "";
          var cls = target.className && typeof target.className === "string" ? "." + target.className.trim().split(/\s+/).slice(0, 2).join(".") : "";
          return String(target.tagName || target.nodeName || "") + id + cls;
        }
        window.addEventListener("wheel", function(event) {
          counts.wheel += 1;
          lastWheel = "dy=" + Math.round(event.deltaY) + " mode=" + event.deltaMode + " ctrl=" + (event.ctrlKey ? "1" : "0") + " target=" + targetLabel(event.target);
        }, { capture: true, passive: true });
        window.addEventListener("scroll", function() {
          counts.scroll += 1;
        }, { passive: true });
        window.addEventListener("gesturestart", function() { counts.gesturestart += 1; }, { capture: true, passive: true });
        window.addEventListener("gesturechange", function() { counts.gesturechange += 1; }, { capture: true, passive: true });
        window.setInterval(function() {
          var zoom = document.getElementById("zoomReadout")?.textContent || "";
          panel.textContent = [
            "input debug",
            "wheel " + counts.wheel,
            "scroll " + counts.scroll,
            "gesturestart " + counts.gesturestart,
            "gesturechange " + counts.gesturechange,
            zoom,
            lastWheel
          ].join("\n");
        }, 120);
      })();
    </script>
    <script>
      (function(){
        function setupLayerDisclosureClicks(){
          document.querySelectorAll(".layer-group > summary").forEach(function(summary){
            if (summary.dataset.okDisclosureFixed === "true") return;
            summary.dataset.okDisclosureFixed = "true";
            summary.addEventListener("click", function(event){
              var target = event.target;
              if (target && target.closest && target.closest("input")) {
                event.stopPropagation();
                return;
              }
              event.preventDefault();
              var details = summary.parentElement;
              if (details) details.open = !details.open;
            });
            summary.addEventListener("keydown", function(event){
              if (event.key !== "Enter" && event.key !== " ") return;
              if (event.target && event.target.closest && event.target.closest("input")) return;
              event.preventDefault();
              var details = summary.parentElement;
              if (details) details.open = !details.open;
            });
          });
        }
        if (document.readyState === "loading") {
          document.addEventListener("DOMContentLoaded", setupLayerDisclosureClicks);
        } else {
          setupLayerDisclosureClicks();
        }
      })();
    </script>
    <script>
      (function(){
        function updateClearState(wrapper) {
          if (!wrapper) return;
          var input = wrapper.querySelector("input");
          wrapper.classList.toggle("has-value", !!(input && input.value));
        }
        document.querySelectorAll(".clear-field").forEach(function(wrapper){
          var input = wrapper.querySelector("input");
          var button = wrapper.querySelector(".field-clear");
          if (!input || !button) return;
          var randomSuffix = Date.now().toString(36) + Math.random().toString(36).slice(2);
          input.setAttribute("name", "ok_no_autofill_" + input.id + "_" + randomSuffix);
          input.setAttribute("autocomplete", "off");
          input.setAttribute("aria-autocomplete", "none");
          input.setAttribute("autocapitalize", "off");
          input.setAttribute("autocorrect", "off");
          input.setAttribute("spellcheck", "false");
          input.setAttribute("data-lpignore", "true");
          input.setAttribute("data-1p-ignore", "true");
          input.setAttribute("data-form-type", "other");
          updateClearState(wrapper);
          input.addEventListener("input", function(){ updateClearState(wrapper); });
          input.addEventListener("change", function(){ updateClearState(wrapper); });
          button.addEventListener("click", function(event){
            event.preventDefault();
            input.value = "";
            input.dispatchEvent(new Event("input", { bubbles: true }));
            input.dispatchEvent(new Event("change", { bubbles: true }));
            input.focus();
            updateClearState(wrapper);
          });
        });
      })();
    </script>

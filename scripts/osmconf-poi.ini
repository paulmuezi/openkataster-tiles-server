# Minimal OGR OSM configuration for the OpenKataster POI search index.
# Only explicitly listed fields enter Python. In particular, phone and
# website/contact tags are intentionally not exposed or stored. GDAL expects
# these dataset-wide settings before the five layer sections.
closed_ways_are_polygons=aeroway,amenity,boundary,building,club,craft,emergency,geological,healthcare,historic,landuse,leisure,military,natural,office,place,public_transport,shop,sport,tourism,highway=platform,public_transport=platform
tags_format=json


osm_id=yes
osm_version=no
osm_timestamp=no
osm_uid=no
osm_user=no
osm_changeset=no
attributes=name,name:de,name:en,alt_name,official_name,short_name,loc_name,old_name,brand,operator,ref,iata,icao,addr:street,addr:housenumber,addr:postcode,addr:city,addr:place,amenity,shop,tourism,information,leisure,office,government,diplomatic,craft,club,healthcare,healthcare:speciality,social_facility,historic,public_transport,railway,aeroway,natural,man_made,emergency,landuse,highway,aerialway,waterway,building,place,religion,denomination,sport,cuisine,disused,abandoned
unsignificant=created_by,converted_by,source,time,ele,attribution
ignore=created_by,converted_by,source,time,ele,note,todo,openGeoDB:,fixme,FIXME
other_tags=no

